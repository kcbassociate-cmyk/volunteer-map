<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Events Map – Keep California Beautiful</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --kcb-blue: #1a5f9e;
    --kcb-blue-dark: #0d3d6e;
    --kcb-orange: #f5821f;
    --kcb-orange-light: #ffaa55;
    --kcb-cream: #f7f9fc;
    --kcb-white: #ffffff;
    --kcb-text: #0d2340;
    --shadow-lg: 0 8px 40px rgba(26,95,158,0.22);
  }
  body { font-family: 'Open Sans', sans-serif; background: var(--kcb-cream); color: var(--kcb-text); }
  header { background: var(--kcb-blue-dark); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 70px; }
  .header-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
  .logo-text { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1rem; }
  .logo-text span { display: block; font-weight: 400; font-size: 0.7rem; color: var(--kcb-orange-light); }
  .hero { background: #0d3d6e; padding: 3rem 2rem; text-align: center; color: white; }
  .search-wrap { max-width: 500px; margin: 20px auto; background: white; border-radius: 50px; display: flex; overflow: hidden; box-shadow: var(--shadow-lg); }
  #zip-input { flex: 1; border: none; padding: 15px 25px; outline: none; }
  #search-btn { background: var(--kcb-orange); border: none; color: white; padding: 0 25px; font-weight: 800; cursor: pointer; }
  .main { display: grid; grid-template-columns: 350px 1fr; min-height: 600px; }
  .event-panel { background: white; border-right: 1px solid #ddd; overflow-y: auto; max-height: 700px; padding: 1rem; }
  .event-card { padding: 1rem; border-bottom: 1px solid #eee; cursor: pointer; border-radius: 8px; margin-bottom: 10px; }
  .event-card:hover { background: #f0f7ff; }
  .map-area { background: #e6f0fa; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #ca-map-svg { width: 100%; height: auto; max-width: 450px; }
  .map-pin { cursor: pointer; fill: var(--kcb-blue); transition: 0.2s; }
  .map-pin:hover { fill: var(--kcb-orange); }
  #map-tooltip { position: absolute; display: none; background: white; border: 2px solid var(--kcb-blue); border-radius: 8px; padding: 15px; width: 220px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .tooltip-btn { display: block; background: var(--kcb-orange); color: white; text-align: center; padding: 10px; border-radius: 5px; text-decoration: none; margin-top: 10px; font-weight: 700; }
  @media (max-width: 768px) { .main { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="logo-text">Keep California Beautiful<span>Volunteer Event Map 2026</span></div>
  </div>
</header>

<section class="hero">
  <h1>Find an Event Near You</h1>
  <div class="search-wrap">
    <input id="zip-input" type="text" placeholder="Enter zip code...">
    <button id="search-btn" onclick="searchByZip()">Search</button>
  </div>
</section>

<div class="main">
  <aside class="event-panel">
    <h3>Events List</h3>
    <div id="event-list"></div>
  </aside>

  <div class="map-area" id="map-container">
    <div id="map-tooltip">
      <div id="tt-name" style="font-weight:800; margin-bottom:5px;"></div>
      <div id="tt-date" style="color:var(--kcb-blue); font-size:0.8rem;"></div>
      <a id="tt-link" class="tooltip-btn" href="#" target="_blank">Sign Up →</a>
    </div>
    <svg id="ca-map-svg" viewBox="0 0 500 650">
      <path fill="#ffffff" stroke="#1a5f9e" stroke-width="2" d="M430,20 L80,20 L75,40 L30,150 L40,400 L70,480 L120,580 L250,580 L400,480 L420,20 Z" />
      <g id="pins-layer"></g>
    </svg>
  </div>
</div>

<script>
const events = [
  { name: "Arrowhead Clean Energy", date: "Sept 5, 2026", link: "https://x.gldn.io/e/TA06B2tth3b", lat: 34.1, lng: -117.2, zip: "92401" },
  { name: "Sutro Wildfire Resiliency", date: "Oct 17, 2026", link: "https://x.gldn.io/e/ZGxkfJuth3b", lat: 37.7, lng: -122.4, zip: "94117" },
  { name: "Edison Elementary Greening", date: "Nov 21, 2026", link: "https://x.gldn.io/e/mubzk4xth3b", lat: 34.1, lng: -118.3, zip: "91506" },
  { name: "Carmel Wildfire Prevention", date: "May 30, 2026", link: "https://x.gldn.io/e/An9C8lAth3b", lat: 36.5, lng: -121.9, zip: "93923" },
  { name: "Garden School Composting", date: "May 30, 2026", link: "https://x.gldn.io/e/VTrtvMCth3b", lat: 34.0, lng: -118.3, zip: "90036" }
];

function project(lat, lng) {
  const x = (lng + 124.5) * (400 / 10) + 50;
  const y = (42.5 - lat) * (550 / 10) + 50;
  return { x, y };
}

function render() {
  const list = document.getElementById('event-list');
  const layer = document.getElementById('pins-layer');
  
  events.forEach((ev, i) => {
    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `<strong>${ev.name}</strong><br><small>${ev.date}</small>`;
    card.onclick = () => select(i);
    list.appendChild(card);

    const { x, y } = project(ev.lat, ev.lng);
    const pin = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    pin.setAttribute('cx', x);
    pin.setAttribute('cy', y);
    pin.setAttribute('r', '8');
    pin.setAttribute('class', 'map-pin');
    pin.onclick = () => select(i);
    layer.appendChild(pin);
  });
}

function select(i) {
  const ev = events[i];
  const tt = document.getElementById('map-tooltip');
  document.getElementById('tt-name').innerText = ev.name;
  document.getElementById('tt-date').innerText = ev.date;
  document.getElementById('tt-link').href = ev.link;
  
  const { x, y } = project(ev.lat, ev.lng);
  tt.style.display = 'block';
  tt.style.left = (x - 110) + 'px';
  tt.style.top = (y - 120) + 'px';
}

function searchByZip() {
  const val = document.getElementById('zip-input').value;
  const idx = events.findIndex(e => e.zip === val);
  if(idx !== -1) select(idx);
  else alert("No events found for that zip code.");
}

render();
</script>
</body>
</html>
