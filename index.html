<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Events Map – Keep California Beautiful</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --kcb-blue: #1a5f9e;
    --kcb-blue-dark: #0d3d6e;
    --kcb-blue-light: #2e7fc0;
    --kcb-blue-pale: #e6f0fa;
    --kcb-orange: #f5821f;
    --kcb-orange-light: #ffaa55;
    --kcb-cream: #f7f9fc;
    --kcb-white: #ffffff;
    --kcb-text: #0d2340;
    --kcb-text-muted: #4a6080;
    --kcb-border: #b8d0e8;
    --shadow-md: 0 4px 20px rgba(26,95,158,0.18);
    --shadow-lg: 0 8px 40px rgba(26,95,158,0.22);
  }
  body { font-family: 'Open Sans', sans-serif; background: var(--kcb-cream); color: var(--kcb-text); min-height: 100vh; }
  header { background: var(--kcb-blue-dark); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 70px; box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
  .header-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-icon { width: 44px; height: 44px; }
  .logo-text { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1rem; color: #fff; line-height: 1.2; }
  .logo-text span { display: block; font-weight: 400; font-size: 0.7rem; color: var(--kcb-orange-light); text-transform: uppercase; }
  .header-nav { display: flex; gap: 1.5rem; align-items: center; }
  .header-nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
  .btn-donate { background: var(--kcb-orange) !important; color: #fff !important; padding: 8px 18px; border-radius: 20px; font-weight: 700 !important; }
  .hero { background: linear-gradient(135deg, var(--kcb-blue-dark) 0%, #0a2d52 60%); padding: 3rem 2rem; text-align: center; color: white; }
  .search-wrap { max-width: 480px; margin: 1.5rem auto 0; position: relative; }
  .search-bar { display: flex; background: #fff; border-radius: 50px; overflow: hidden; box-shadow: var(--shadow-lg); }
  #zip-input { flex: 1; border: none; outline: none; font-size: 1rem; padding: 12px 20px; color: var(--kcb-text); }
  #search-btn { background: var(--kcb-orange); border: none; color: #fff; font-weight: 800; padding: 0 1.5rem; cursor: pointer; }
  .stats-bar { background: var(--kcb-blue-pale); border-bottom: 1px solid var(--kcb-border); padding: 1rem; display: flex; justify-content: center; gap: 3rem; }
  .stat-num { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--kcb-blue); }
  .stat-label { font-size: 0.7rem; color: var(--kcb-text-muted); text-transform: uppercase; }
  .main { display: grid; grid-template-columns: 380px 1fr; min-height: 600px; }
  .event-panel { background: var(--kcb-white); border-right: 1px solid var(--kcb-border); overflow-y: auto; height: 650px; }
  .panel-header { padding: 1rem; border-bottom: 1px solid var(--kcb-border); position: sticky; top: 0; background: white; z-index: 5; }
  .event-card { padding: 1rem; border-bottom: 1px solid var(--kcb-border); cursor: pointer; transition: 0.2s; position: relative; }
  .event-card:hover, .event-card.active { background: var(--kcb-blue-pale); border-left: 4px solid var(--kcb-blue); }
  .event-card-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 5px; padding-right: 70px; }
  .event-date-pill { background: var(--kcb-blue); color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; }
  .event-card-link { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--kcb-orange); color: white; padding: 5px 10px; border-radius: 10px; text-decoration: none; font-size: 0.7rem; font-weight: bold; }
  .map-area { position: relative; background: #eef4fb; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #ca-map-svg { width: 90%; height: 90%; max-height: 600px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
  .map-pin { cursor: pointer; transition: transform 0.2s; }
  .map-pin:hover { transform: scale(1.2); }
  .pin-outer { fill: var(--kcb-blue); stroke: white; stroke-width: 1.5; }
  .pin-inner { fill: var(--kcb-orange); }
  .highlighted .pin-outer { fill: var(--kcb-orange); }
  #map-tooltip { position: absolute; display: none; background: #fff; border: 2px solid var(--kcb-blue); border-radius: 10px; padding: 12px; width: 220px; box-shadow: var(--shadow-md); z-index: 100; pointer-events: none; }
  footer { background: var(--kcb-blue-dark); color: white; text-align: center; padding: 2rem; font-size: 0.8rem; }
  @media (max-width: 760px) { .main { grid-template-columns: 1fr; } .event-panel { height: 300px; } }
</style>
</head>
<body>

<header>
  <a class="header-logo" href="#">
    <svg class="logo-icon" viewBox="0 0 44 44"><circle cx="22" cy="22" r="22" fill="#f5821f"/><text x="22" y="29" text-anchor="middle" font-family="Montserrat" font-weight="900" font-size="15" fill="#fff">KCB</text></svg>
    <div class="logo-text">Keep California Beautiful<span>Volunteer Portal</span></div>
  </a>
  <nav class="header-nav"><a href="#" class="btn-donate">Donate</a></nav>
</header>

<section class="hero">
  <h1>Volunteer Events Map</h1>
  <div class="search-wrap">
    <div class="search-bar">
      <input id="zip-input" type="text" placeholder="Enter Zip Code">
      <button id="search-btn" onclick="searchByZip()">Search</button>
    </div>
  </div>
</section>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" id="stat-events">15</div><div class="stat-label">Events</div></div>
  <div class="stat-item"><div class="stat-num">2026</div><div class="stat-label">Year</div></div>
</div>

<div class="main">
  <aside class="event-panel">
    <div class="panel-header"><h2 id="result-count">All Events</h2></div>
    <div class="event-list" id="event-list"></div>
  </aside>

  <div class="map-area">
    <div id="map-tooltip">
      <div id="tt-name" style="font-weight:bold; font-size:0.8rem; margin-bottom:5px;"></div>
      <div id="tt-date" style="color:var(--kcb-blue); font-size:0.75rem;"></div>
    </div>
    <svg id="ca-map-svg" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
      <path id="ca-shape" fill="#c8dff5" stroke="#1a5f9e" stroke-width="2" 
        d="M60,20 L440,20 L440,110 L410,150 L390,190 L380,240 L375,300 L370,360 L360,400 L340,430 L300,450 L250,460 L200,470 L170,510 L180,550 L160,580 L40,580 L35,550 L50,520 L80,490 L85,450 L70,430 L40,410 L20,380 L25,320 L50,260 L45,210 L30,170 L20,100 L30,50 Z" />
      <g id="pins-layer"></g>
    </svg>
  </div>
</div>

<footer><strong>Keep California Beautiful</strong><br>© 2026</footer>

<script>
// Accurate projection for CA: Lat 32-42, Lng -124 to -114
const CA = { latMin:32.5, latMax:42, lngMin:-124.5, lngMax:-114 };
const SX = { min:40, max:440 }; // SVG X range
const SY = { min:20, max:580 }; // SVG Y range

function project(lat, lng) {
  const x = SX.min + (lng - CA.lngMin) / (CA.lngMax - CA.lngMin) * (SX.max - SX.min);
  const y = SY.max - (lat - CA.latMin) / (CA.latMax - CA.latMin) * (SY.max - SY.min);
  return { x, y };
}

const events = [
  { name: "Arrowhead Clean Energy", location: "San Bernardino", date: "Sept 5, 2026", lat: 34.1, lng: -117.3, link: "#", zip: ["92401"] },
  { name: "Sutro Wildfire Resiliency", location: "San Francisco", date: "Oct 17, 2026", lat: 37.7, lng: -122.4, link: "#", zip: ["94117"] },
  { name: "Burbank Community Greening", location: "Burbank", date: "Nov 21, 2026", lat: 34.2, lng: -118.3, link: "#", zip: ["91506"] },
  { name: "Carmel Wildfire Prevention", location: "Carmel", date: "May 30, 2026", lat: 36.5, lng: -121.9, link: "#", zip: ["93923"] },
  { name: "LA Composting Project", location: "Los Angeles", date: "May 30, 2026", lat: 34.0, lng: -118.3, link: "#", zip: ["90036"] },
  { name: "CultivaLA Bioswale", location: "South El Monte", date: "June 13, 2026", lat: 34.0, lng: -118.0, link: "#", zip: ["91733"] },
  { name: "Santa Cruz Greening", location: "Santa Cruz", date: "Aug 8, 2026", lat: 36.9, lng: -122.0, link: "#", zip: ["95060"] },
  { name: "Richmond Greenway", location: "Richmond", date: "Oct 24, 2026", lat: 37.9, lng: -122.3, link: "#", zip: ["94801"] },
  { name: "Urban Sprouts SF", location: "San Francisco", date: "Sept 12, 2026", lat: 37.7, lng: -122.4, link: "#", zip: ["94112"] },
  { name: "Upland Tree Maintenance", location: "Upland", date: "May 24, 2026", lat: 34.1, lng: -117.6, link: "#", zip: ["91786"] },
  { name: "Franklin St SF Greening", location: "San Francisco", date: "June 14, 2026", lat: 37.8, lng: -122.4, link: "#", zip: ["94109"] },
  { name: "Santa Clarita Expo", location: "Newhall", date: "Sept 19, 2026", lat: 34.4, lng: -118.5, link: "#", zip: ["91321"] },
  { name: "LA River Restoration", location: "Van Nuys", date: "Sept 26, 2026", lat: 34.2, lng: -118.5, link: "#", zip: ["91406"] },
  { name: "Gay For Good LAUSD", location: "Los Angeles", date: "May 23, 2026", lat: 33.9, lng: -118.2, link: "#", zip: ["90001"] },
  { name: "Groundwork San Diego", location: "San Diego", date: "Sept 26, 2026", lat: 32.7, lng: -117.1, link: "#", zip: ["92114"] }
];

let activeIdx = null;

function render() {
  const list = document.getElementById('event-list');
  const layer = document.getElementById('pins-layer');
  list.innerHTML = ''; layer.innerHTML = '';

  events.forEach((ev, i) => {
    // Sidebar
    const card = document.createElement('div');
    card.className = 'event-card' + (i === activeIdx ? ' active' : '');
    card.innerHTML = `<div class="event-card-name">${ev.name}</div><span class="event-date-pill">${ev.date}</span><a class="event-card-link" href="${ev.link}">Sign Up</a>`;
    card.onclick = () => { activeIdx = i; render(); };
    list.appendChild(card);

    // Map Pin
    const { x, y } = project(ev.lat, ev.lng);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'map-pin' + (i === activeIdx ? ' highlighted' : ''));
    g.setAttribute('transform', `translate(${x},${y})`);
    g.innerHTML = `<circle class="pin-outer" r="8"/><circle class="pin-inner" r="3"/>`;
    g.onclick = () => { activeIdx = i; render(); showTooltip(i, x, y); };
    layer.appendChild(g);
  });
}

function showTooltip(i, x, y) {
  const tt = document.getElementById('map-tooltip');
  document.getElementById('tt-name').textContent = events[i].name;
  document.getElementById('tt-date').textContent = events[i].date;
  tt.style.display = 'block';
  tt.style.left = (x + 20) + 'px';
  tt.style.top = (y - 40) + 'px';
}

function searchByZip() {
  const zip = document.getElementById('zip-input').value;
  const found = events.findIndex(ev => ev.zip.includes(zip));
  if (found !== -1) { activeIdx = found; render(); }
}

render();
</script>
</body>
</html>
